<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TUTUR KARO</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
body { font-family: Arial; background:#111; color:#fff; margin:0 }
.container { padding:16px }
.card { background:#1e1e1e; padding:12px; margin:10px 0; border-radius:12px }
input, button { padding:14px; margin:6px 0; width:100%; border-radius:10px; border:none; font-size:16px }
button { background:#b71c1c; color:white }
img { width:100%; height:150px; object-fit:cover; border-radius:10px }
.hidden { display:none }
.relasi button { margin:4px 0 }
.small { font-size:12px; opacity:0.7 }
</style>
</head>
<body>

<div class="container" id="loginPage">
<h2>TUTUR KARO</h2>
<input type="password" id="password" placeholder="Password" />
<button id="btnLogin">MASUK</button>
</div>

<div class="container hidden" id="registerPage">
<h2>DATA DIRI</h2>
<input id="nama" placeholder="Nama" />
<input id="marga" placeholder="Marga" />
<input type="file" id="foto" accept="image/*" />
<button id="btnSimpan">SIMPAN</button>
</div>

<div class="container hidden" id="searchPage">
<h2>PENCARIAN</h2>
<input id="cari" placeholder="Cari nama" />
<div id="hasil"></div>
</div>

<div class="container hidden" id="relasiPage">
<h2>HASIL RELASI</h2>
<div id="relasiHasil"></div>
<button id="btnBack">KEMBALI</button>
</div>
<footer style="text-align:center;padding:20px;color:var(--muted);font-size:15px"><p>🙏 Mejuah-juah | © 2026 Budaya Karo</p>
<p style="font-size:13px">tinembok@gmail.com</p></footer></div>

<script>
window.onload = function(){

const supabase = window.supabase.createClient(
'https://ucjcpyjuvwebkiyxgzel.supabase.co',
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVjamNweWp1dndlYmtpeXhnemVsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxNTIzODEsImV4cCI6MjA5MTcyODM4MX0.cQeZJZAqWmGLReuarfYZ9kHOYQaK3ujnXVJHWpsIlrQ'
);

const loginPage = document.getElementById('loginPage');
const registerPage = document.getElementById('registerPage');
const searchPage = document.getElementById('searchPage');
const relasiPage = document.getElementById('relasiPage');

let currentUser = null;

// event
document.getElementById('btnLogin').addEventListener('click', login);
document.getElementById('btnSimpan').addEventListener('click', simpan);
document.getElementById('btnBack').addEventListener('click', back);
document.getElementById('cari').addEventListener('input', cari);

function login(){
const pass = document.getElementById('password').value;
if(pass === 'mejuahjuah'){
loginPage.classList.add('hidden');
registerPage.classList.remove('hidden');
}else{
alert('Password salah');
}
}

function back(){
relasiPage.classList.add('hidden');
searchPage.classList.remove('hidden');
}

async function simpan(){
const nama = document.getElementById('nama').value.toLowerCase().trim();
const marga = document.getElementById('marga').value.toLowerCase().trim();

await supabase.from('orang').insert([{nama,marga}]);

registerPage.classList.add('hidden');
searchPage.classList.remove('hidden');
}

async function cari(){
const k = document.getElementById('cari').value;
const { data } = await supabase.from('orang').select('*').ilike('nama','%'+k+'%');

const hasil = document.getElementById('hasil');
hasil.innerHTML='';

if(!data) return;

for(let o of data){
const div = document.createElement('div');
div.className='card';
div.innerHTML = '<h3>'+o.nama+' ('+o.marga+')</h3>';
hasil.appendChild(div);
}
}

}
</script>

</body>
</html>
