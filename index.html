<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TUTUR KARO</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
body { font-family: Arial; background:#111; color:#fff; margin:0 }
.container { padding:16px }
.card { background:#1e1e1e; padding:12px; margin:10px 0; border-radius:12px }
input, button, select { padding:14px; margin:6px 0; width:100%; border-radius:10px; border:none; font-size:16px }
button { background:#b71c1c; color:white }
img { width:100%; height:120px; object-fit:cover; border-radius:10px }
.hidden { display:none }
.relasi button { margin:4px 0; background:#333 }
</style>
</head>
<body>

<div class="container" id="loginPage">
<h2>TUTUR KARO</h2>
<input type="password" id="password" placeholder="Password" />
<button id="btnLogin">MASUK</button>
</div>

<div class="container hidden" id="registerPage">
<h2>DATA DIRI</h2>
<input id="nama" placeholder="Nama" />
<input id="marga" placeholder="Marga" />
<button id="btnSimpan">SIMPAN</button>
</div>

<div class="container hidden" id="searchPage">
<h2>PENCARIAN</h2>
<input id="cari" placeholder="Cari nama" />
<div id="hasil"></div>
</div>

<div class="container hidden" id="relasiPage">
<h2>HASIL RELASI</h2>
<div id="relasiHasil"></div>
<button id="btnBack">KEMBALI</button>
</div>

<div class="container hidden" id="tambahPage">
<h2>TAMBAH RELASI</h2>
<select id="pilihJenis">
<option value="">Pilih Relasi</option>
<option value="kalimbubu">Kalimbubu</option>
<option value="anak_beru">Anak Beru</option>
<option value="sembuyak">Sembuyak</option>
</select>
<select id="pilihTarget"></select>
<button id="btnTambahRelasi">SIMPAN RELASI</button>
<button id="btnBatal">BATAL</button>
</div>
<footer style="text-align:center;padding:20px;color:var(--muted);font-size:15px"><p>🙏 Mejuah-juah | © 2026 Budaya Karo</p>
<p style="font-size:13px">tinembok@gmail.com</p></footer></div>

<script>
window.onload = function(){

const supabase = window.supabase.createClient(
'https://ucjcpyjuvwebkiyxgzel.supabase.co',
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVjamNweWp1dndlYmtpeXhnemVsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxNTIzODEsImV4cCI6MjA5MTcyODM4MX0.cQeZJZAqWmGLReuarfYZ9kHOYQaK3ujnXVJHWpsIlrQ'
);

let selectedId = null;
let semuaOrang = [];

const loginPage = document.getElementById('loginPage');
const registerPage = document.getElementById('registerPage');
const searchPage = document.getElementById('searchPage');
const relasiPage = document.getElementById('relasiPage');
const tambahPage = document.getElementById('tambahPage');

// EVENT
document.getElementById('btnLogin').onclick = login;
document.getElementById('btnSimpan').onclick = simpan;
document.getElementById('btnBack').onclick = back;
document.getElementById('cari').oninput = cari;
document.getElementById('btnTambahRelasi').onclick = simpanRelasi;
document.getElementById('btnBatal').onclick = ()=>{
  tambahPage.classList.add('hidden');
  searchPage.classList.remove('hidden');
};

function login(){
if(document.getElementById('password').value==='mejuahjuah'){
loginPage.classList.add('hidden');
registerPage.classList.remove('hidden');
}
}

async function simpan(){
const nama = document.getElementById('nama').value.toLowerCase().trim();
const marga = document.getElementById('marga').value.toLowerCase().trim();

await supabase.from('orang').insert([{nama,marga}]);

registerPage.classList.add('hidden');
searchPage.classList.remove('hidden');
loadSemua();
}

async function loadSemua(){
const { data } = await supabase.from('orang').select('*');
semuaOrang = data || [];

const select = document.getElementById('pilihTarget');
select.innerHTML = '<option value="">Pilih Orang</option>';

semuaOrang.forEach(o=>{
select.innerHTML += `<option value="${o.id}">${o.nama} (${o.marga})</option>`;
});
}

async function cari(){
const k = document.getElementById('cari').value.toLowerCase();
const { data } = await supabase.from('orang').select('*').ilike('nama','%'+k+'%');

const hasil = document.getElementById('hasil');
hasil.innerHTML='';

(data||[]).forEach(o=>{
const div=document.createElement('div');
div.className='card';
div.innerHTML=`
<h3>${o.nama} (${o.marga})</h3>
<div class="relasi">
<button onclick="lihat(${o.id},'kalimbubu')">Kalimbubu</button>
<button onclick="lihat(${o.id},'anak_beru')">Anak Beru</button>
<button onclick="lihat(${o.id},'sembuyak')">Sembuyak</button>
</div>
<button onclick="bukaTambah(${o.id})">+ Tambah Relasi</button>
`;
hasil.appendChild(div);
});
}

window.lihat = async function(id,jenis){
searchPage.classList.add('hidden');
relasiPage.classList.remove('hidden');

const { data } = await supabase.from('relasi').select('target_id').eq('orang_id',id).eq('jenis',jenis);

const relasiHasil = document.getElementById('relasiHasil');
relasiHasil.innerHTML='';

for(let r of (data||[])){
const { data:o } = await supabase.from('orang').select('*').eq('id',r.target_id).single();
if(!o) continue;

relasiHasil.innerHTML += `<div class="card"><h3>${o.nama} (${o.marga})</h3></div>`;
}
}

window.bukaTambah = function(id){
selectedId = id;
searchPage.classList.add('hidden');
tambahPage.classList.remove('hidden');
}

async function simpanRelasi(){
const jenis = document.getElementById('pilihJenis').value;
const target = document.getElementById('pilihTarget').value;

if(!jenis || !target) return alert('Lengkapi data');

await supabase.rpc('tambah_relasi',{
  p_orang: selectedId,
  p_target: parseInt(target),
  p_jenis: jenis
});

alert('Berhasil');
tambahPage.classList.add('hidden');
searchPage.classList.remove('hidden');
}

function back(){
relasiPage.classList.add('hidden');
searchPage.classList.remove('hidden');
}

}
</script>

</body>
</html>
